services:
  - type: web
    name: aagcp-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AAGCP_OTEL
        value: "1"
      # Set in Render dashboard after Phoenix service URL is known:
      # https://aagcp-phoenix.onrender.com/v1/traces
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      # Optional: set this to use OpenAI API embeddings (no torch, low memory)
      # - key: OPENAI_API_KEY
      #   sync: false

  - type: web
    name: aagcp-phoenix
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: phoenix serve
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
